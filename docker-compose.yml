# VPN Gateway — single container
# WireGuard + Unbound DNS + VPN Gateway + iptables
# network_mode: host for direct network access

services:
  vpn-gateway:
    build: .
    container_name: vpn-gateway
    network_mode: host
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    entrypoint: ["/entrypoint-simple.sh"]
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
    environment:
      - RUST_LOG=${LOG_LEVEL:-info}
      - WG_SERVER_URL=${WG_SERVER_URL:-auto}
      - WG_PORT=${WG_PORT:-51820}
      - WG_PEERS=${WG_PEERS:-2}
    ulimits:
      nofile: 1048576
    restart: unless-stopped
