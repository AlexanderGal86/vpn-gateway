services:
  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - SERVERURL=${WG_SERVER_URL:-auto}
      - SERVERPORT=${WG_PORT:-51820}
      - PEERS=${WG_PEERS:-2}
      - PEERDNS=10.13.13.1
      - INTERNAL_SUBNET=10.13.13.0/24
      - ALLOWEDIPS=0.0.0.0/0
    volumes:
      - ./data/wg:/config
    ports:
      - "${WG_PORT:-51820}:${WG_PORT:-51820}/udp"
      - "${API_PORT:-8080}:8080/tcp"
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    restart: unless-stopped

  vpn-gateway:
    build: .
    container_name: vpn-gateway
    network_mode: service:wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    entrypoint: ["/entrypoint.sh"]
    depends_on:
      - wireguard
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
    environment:
      - RUST_LOG=vpn_gateway=info
    ulimits:
      nofile: 1048576
    restart: unless-stopped

  unbound:
    image: mvance/unbound:latest
    container_name: unbound
    network_mode: service:wireguard
    depends_on:
      - wireguard
    volumes:
      - ./config/unbound:/opt/unbound/etc/unbound
    restart: unless-stopped
