# VPN Gateway — single container deployment
# WireGuard + Unbound DNS + transparent proxy + iptables
#
# Usage:
#   docker compose up -d
#
# On first start, the container will automatically:
#   - Generate WireGuard server keys and peer configs (data/wg/)
#   - Create Unbound DNS config (data/unbound/)
#   - Download GeoIP database (data/GeoLite2-City.mmdb)
#
# Client configs and QR codes: data/wg/peer1/peer1.conf, peer1-qr.png
# Dashboard: http://10.13.13.1:8080  (WireGuard clients or localhost only)

services:
  vpn-gateway:
    image: ghcr.io/alexandergal86/vpn-gateway:latest
    pull_policy: always
    container_name: vpn-gateway
    network_mode: host
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    volumes:
      - ./data:/app/data
    environment:
      - RUST_LOG=${LOG_LEVEL:-info}
      - WG_SERVER_URL=${WG_SERVER_URL:-auto}
      - WG_PORT=${WG_PORT:-51820}
      - WG_PEERS=${WG_PEERS:-2}
    ulimits:
      nofile: 1048576
    restart: unless-stopped
