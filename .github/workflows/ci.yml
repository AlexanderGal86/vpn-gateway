name: CI

on:
  push:
    branches: [main]
  pull_request:
  repository_dispatch:
    types: [run_ci]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          tags: vpn-gateway:latest
          load: true

      - name: Run tests in Docker with NET_ADMIN
        run: docker run --cap-add=NET_ADMIN vpn-gateway make test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup show

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "vpn-gateway"
          cache-targets: false

      - name: Lint
        run: make lint

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup show

      - name: Format check
        run: make fmt
