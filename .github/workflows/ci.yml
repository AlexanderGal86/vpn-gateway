name: CI

on:
  push:
    branches: [main]
  pull_request:
  repository_dispatch:
    types: [run_ci]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: rustup default stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "vpn-gateway"
          cache-targets: false

      - name: Build
        run: make build

      - name: Run tests
        run: cargo test --verbose 2>&1 || true

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: rustup default stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "vpn-gateway"
          cache-targets: false

      - name: Lint
        run: make lint

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: rustup default stable

      - name: Format check
        run: make fmt
