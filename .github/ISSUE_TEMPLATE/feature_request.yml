name: Feature Request
description: Suggest a new feature or enhancement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Gateway (Rust proxy)
        - API (Axum web server)
        - Proxy Pool / Health Check
        - net-manager (Python sidecar)
        - Docker / Deployment
        - WireGuard / Networking
        - CI/CD / Tooling
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
