name: Bug Report
description: Report a bug in the VPN gateway
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Clear description of what happened
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      value: |
        1.
        2.
        3.

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Gateway (Rust proxy)
        - API (Axum web server)
        - Proxy Pool / Health Check
        - net-manager (Python sidecar)
        - Docker / Deployment
        - WireGuard / Networking
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      render: shell

  - type: input
    id: version
    attributes:
      label: Version / Commit
      placeholder: e.g., v0.1.0 or commit hash
