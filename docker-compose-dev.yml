# Override for Docker Desktop / generic local dev where macvlan is unavailable.
# Usage: docker compose -f docker-compose-local.yml -f docker-compose-dev.yml up

services:
  net-manager:
    # Keep net-manager inside Compose networking; just remove macvlan attachment.
    networks:
      - vpn-internal
    environment:
      - NET_MANAGER_MODE=bridge
      - DOCKER_HOST_IP=${DOCKER_HOST_IP:-host.docker.internal}

networks:
  ext_net:
    driver: bridge
